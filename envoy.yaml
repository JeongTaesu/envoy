node:
  id: local-envoy
  cluster: local-cluster

static_resources:
  clusters:
    - name: xds_cluster
      connect_timeout: 5s
      type: logical_dns
      lb_policy: round_robin
      http2_protocol_options: {}
      load_assignment:
        cluster_name: xds_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 18000

admin:
  access_log_path: ./admin.log
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

dynamic_resources:
  ads_config:
    api_type: GRPC
    transport_api_version: V3
    grpc_services:
      - envoy_grpc:
          cluster_name: xds_cluster

  lds_config:
    ads: {}
    resource_api_version: V3

  cds_config:
    ads: {}
    resource_api_version: V3